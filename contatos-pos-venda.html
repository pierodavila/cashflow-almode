<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📞 Contatos Pós-Venda</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;padding:20px;color:#333}
    .container{max-width:1400px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .header-title{color:white}
    .header-title h1{font-size:28px;display:flex;align-items:center;gap:10px}
    .header-title p{color:#aaa;font-size:13px;margin-top:4px}
    .btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .btn-voltar{background:#2196F3;color:white}
    .btn-voltar:hover{background:#0b7dda;transform:translateY(-1px)}
    .btn-sair{background:#555;color:white}
    .btn-sair:hover{background:#333}
    .btn-primary{background:#4CAF50;color:white}
    .btn-primary:hover{background:#43a047}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
    .stat{background:white;padding:18px;border-radius:10px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.1)}
    .stat h3{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .stat .n{font-size:32px;font-weight:bold;color:#4CAF50}
    .stat.warn .n{color:#ff9800}
    .stat.danger .n{color:#f44336}
    .filtros{background:white;padding:16px;border-radius:10px;margin-bottom:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
    .fg label{font-size:11px;font-weight:bold;color:#666;text-transform:uppercase}
    .fg select,.fg input{padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .tabela-wrap{background:white;border-radius:10px;overflow:auto;box-shadow:0 4px 15px rgba(0,0,0,.1)}
    table{width:100%;border-collapse:collapse;min-width:800px}
    thead{background:#f5f5f5}
    th{padding:13px 14px;text-align:left;font-size:11px;text-transform:uppercase;color:#555;border-bottom:2px solid #e0e0e0;white-space:nowrap}
    td{padding:13px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
    tr:hover{background:#fafafa}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:bold;text-transform:uppercase}
    .badge-ok{background:#c8e6c9;color:#2e7d32}
    .badge-pend{background:#ffcdd2;color:#c62828}
    .badge-tent{background:#ffe0b2;color:#e65100}
    .badge-ag{background:#e3f2fd;color:#1565c0}
    .empty{text-align:center;padding:40px;color:#999}
    .modal{display:none;position:fixed;z-index:1000;inset:0;background:rgba(0,0,0,.5)}
    .modal-box{background:white;margin:8% auto;padding:28px;border-radius:12px;width:90%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .modal-box h2{margin-bottom:18px;color:#333}
    .fg2{margin-bottom:14px}
    .fg2 label{display:block;margin-bottom:5px;font-size:13px;font-weight:bold;color:#555}
    .fg2 select,.fg2 input,.fg2 textarea{width:100%;padding:9px 11px;border:1.5px solid #ddd;border-radius:7px;font-size:14px;font-family:inherit}
    .fg2 textarea{min-height:70px;resize:vertical}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
    .spinner{width:36px;height:36px;border:4px solid #f3f3f3;border-top:4px solid #4CAF50;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:32px;color:white}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-title">
      <h1>📞 Contatos Pós-Venda</h1>
      <p id="subtitulo">Clientes que compraram nos últimos 30 dias</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-voltar" onclick="location.href='index.html'">← Dashboard</button>
      <button class="btn btn-sair" onclick="App.sair()">🚪 Sair</button>
    </div>
  </header>

  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <p>Carregando clientes...</p>
  </div>

  <div id="appContent" style="display:none">
    <div class="stats">
      <div class="stat"><h3>👥 Total</h3><div class="n" id="sTotal">—</div></div>
      <div class="stat"><h3>✅ Contatados</h3><div class="n" id="sContatados">—</div></div>
      <div class="stat warn"><h3>⏳ Pendentes</h3><div class="n" id="sPendentes">—</div></div>
      <div class="stat"><h3>📊 Taxa</h3><div class="n" id="sTaxa">—</div></div>
    </div>

    <div class="filtros">
      <div class="fg"><label>🏪 Loja</label>
        <select id="fLoja"><option value="">Todas</option>
          <option>FORUM OUTLET</option><option>COLCCI OUTLET OPRJ</option><option>TRITON OUTLET</option>
        </select></div>
      <div class="fg"><label>👤 Vendedor</label><select id="fVendedor"><option value="">Todos</option></select></div>
      <div class="fg"><label>📅 Período</label>
        <select id="fPeriodo"><option value="30">30 dias</option><option value="15">15 dias</option><option value="7">7 dias</option></select></div>
      <div class="fg"><label>Status</label>
        <select id="fStatus"><option value="">Todos</option><option value="sim">✅ Contatados</option><option value="nao">⏳ Pendentes</option></select></div>
      <button class="btn btn-primary" onclick="App.filtrar()">🔍 Filtrar</button>
      <button class="btn btn-sair" onclick="App.exportar()">📥 CSV</button>
    </div>

    <div class="tabela-wrap">
      <table>
        <thead><tr>
          <th>Data Compra</th><th>Cliente</th><th>📱 Telefone</th>
          <th>Loja</th><th>Vendedor</th><th>💰 Valor</th>
          <th>Status</th><th>Observações</th><th>Ação</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h2>📞 Registrar Contato</h2>
    <div class="fg2"><label>Cliente</label><input id="mCliente" readonly></div>
    <div class="fg2"><label>Status *</label>
      <select id="mStatus">
        <option value="">Selecione...</option>
        <option value="contatado">✅ Contatado com sucesso</option>
        <option value="tentativa">⚠️ Tentativa sem resposta</option>
        <option value="agendado">📅 Follow-up agendado</option>
        <option value="impossivel">❌ Impossível contatar</option>
      </select></div>
    <div class="fg2"><label>Vendedor que fez contato *</label><select id="mVendedor"><option value="">Selecione...</option></select></div>
    <div class="fg2"><label>Data/Hora *</label><input type="datetime-local" id="mData"></div>
    <div class="fg2"><label>Observações</label><textarea id="mObs" placeholder="Ex: Cliente vai passar na loja semana que vem..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-sair" onclick="App.fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="App.salvarContato()">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://gudhgyfaizueshafhqvc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZGhneWZhaXp1ZXNoYWZocXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODgzNDksImV4cCI6MjA5NTI2NDM0OX0.LrUMZ6XnQFqvmDMn1n5vkdS5FIgTY8j-tnsMH_dtA08';
const H = {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'};

const App = {
  clientes: [], contatos: {}, clientesFiltrados: [], cpfAtual: null,

  async init() {
    const sessao = JSON.parse(localStorage.getItem('cf_sessao_usuario') || '{}');
    if (!sessao.logado) { location.href = 'login.html'; return; }
    document.getElementById('subtitulo').textContent =
      sessao.loja ? `Sua loja: ${sessao.loja}` : 'Todas as lojas';

    await this.carregarClientes();
    await this.carregarContatos();
    this.popularVendedores();
    this.filtrar();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
  },

  async carregarClientes() {
    const sessao = JSON.parse(localStorage.getItem('cf_sessao_usuario') || '{}');
    const local = JSON.parse(localStorage.getItem('cf_clientes_v2') || '{}');
    let todos = local.clientes || [];

    if (todos.length === 0) {
      let arr = [], p = 0;
      while (true) {
        const r = await fetch(`${SB_URL}/rest/v1/cf_clientes?select=*&limit=1000&offset=${p*1000}`, {headers: H});
        const d = await r.json();
        if (!d.length) break;
        arr.push(...d); p++;
      }
      localStorage.setItem('cf_clientes_v2', JSON.stringify({clientes: arr, _timestamp: Date.now()}));
      todos = arr;
    }

    const dias = parseInt(document.getElementById('fPeriodo')?.value || '30');
    const corte = new Date(); corte.setDate(corte.getDate() - dias);
    let filtrados = todos.filter(c => new Date(c.ultima_compra) >= corte);
    if (sessao.tipo === 'gerente' && sessao.loja) {
      filtrados = filtrados.filter(c => c.loja === sessao.loja);
    }
    this.clientes = filtrados;
  },

  async carregarContatos() {
    const r = await fetch(`${SB_URL}/rest/v1/cf_contatos_pos_venda?select=*`, {headers: H});
    if (!r.ok) return;
    const lista = await r.json();
    this.contatos = {};
    lista.forEach(c => { this.contatos[c.cpf] = c; });
  },

  popularVendedores() {
    const vendedores = [...new Set(this.clientes.map(c => c.vendedor).filter(Boolean))].sort();
    ['fVendedor', 'mVendedor'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      sel.innerHTML = id === 'fVendedor' ? '<option value="">Todos</option>' : '<option value="">Selecione...</option>';
      vendedores.forEach(v => { sel.innerHTML += `<option value="${v}">${v}</option>`; });
    });
  },

  filtrar() {
    const loja = document.getElementById('fLoja').value;
    const vend = document.getElementById('fVendedor').value;
    const status = document.getElementById('fStatus').value;
    let lista = [...this.clientes];
    if (loja) lista = lista.filter(c => c.loja === loja);
    if (vend) lista = lista.filter(c => c.vendedor === vend);
    if (status === 'sim') lista = lista.filter(c => this.contatos[c.cpf]?.contatado);
    if (status === 'nao') lista = lista.filter(c => !this.contatos[c.cpf]?.contatado);
    this.clientesFiltrados = lista;
    this.renderTabela();
    this.renderStats();
  },

  renderStats() {
    const total = this.clientesFiltrados.length;
    const cont = this.clientesFiltrados.filter(c => this.contatos[c.cpf]?.contatado).length;
    document.getElementById('sTotal').textContent = total;
    document.getElementById('sContatados').textContent = cont;
    document.getElementById('sPendentes').textContent = total - cont;
    document.getElementById('sTaxa').textContent = total ? ((cont/total)*100).toFixed(0)+'%' : '—';
  },

  renderTabela() {
    const tbody = document.getElementById('tbody');
    if (!this.clientesFiltrados.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">Nenhum cliente encontrado</td></tr>'; return;
    }
    tbody.innerHTML = this.clientesFiltrados.map(c => {
      const ct = this.contatos[c.cpf];
      const badge = ct?.contatado
        ? `<span class="badge badge-ok">✅ Contatado</span>`
        : `<span class="badge badge-pend">⏳ Pendente</span>`;
      const obs = ct?.observacoes ? ct.observacoes.substring(0, 40) + (ct.observacoes.length > 40 ? '…' : '') : '—';
      const data = c.ultima_compra ? new Date(c.ultima_compra).toLocaleDateString('pt-BR') : '—';
      const valor = (c.total_compras || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
      return `<tr>
        <td>${data}</td>
        <td><strong>${c.nome}</strong></td>
        <td>${c.telefone || '—'}</td>
        <td>${c.loja || '—'}</td>
        <td>${c.vendedor || '—'}</td>
        <td>${valor}</td>
        <td>${badge}</td>
        <td title="${ct?.observacoes || ''}">${obs}</td>
        <td><button class="btn btn-primary" style="padding:6px 12px;font-size:12px" onclick="App.abrirModal('${c.cpf}','${c.nome.replace(/'/g,"\\'")}}')" >📞</button></td>
      </tr>`;
    }).join('');
  },

  abrirModal(cpf, nome) {
    this.cpfAtual = cpf;
    document.getElementById('mCliente').value = nome + ' (' + cpf + ')';
    document.getElementById('mData').value = new Date().toISOString().slice(0,16);
    document.getElementById('mStatus').value = '';
    document.getElementById('mObs').value = '';
    const ct = this.contatos[cpf];
    if (ct) {
      document.getElementById('mStatus').value = ct.status || '';
      document.getElementById('mObs').value = ct.observacoes || '';
    }
    document.getElementById('modal').style.display = 'block';
  },

  fecharModal() { document.getElementById('modal').style.display = 'none'; },

  async salvarContato() {
    const status = document.getElementById('mStatus').value;
    const vendedor = document.getElementById('mVendedor').value;
    const data = document.getElementById('mData').value;
    const obs = document.getElementById('mObs').value;
    if (!status || !vendedor) { alert('Preencha status e vendedor!'); return; }

    const cliente = this.clientes.find(c => c.cpf === this.cpfAtual);
    const payload = {
      cpf: this.cpfAtual,
      nome_cliente: cliente?.nome || '',
      loja: cliente?.loja || '',
      vendedor_login: vendedor,
      vendedor_nome: vendedor,
      data_contato: data,
      status: status,
      observacoes: obs,
      contatado: status === 'contatado' || status === 'agendado',
      updated_at: new Date().toISOString()
    };

    const existe = this.contatos[this.cpfAtual];
    let r;
    if (existe?.id) {
      r = await fetch(`${SB_URL}/rest/v1/cf_contatos_pos_venda?id=eq.${existe.id}`, {
        method: 'PATCH', headers: H, body: JSON.stringify(payload)
      });
    } else {
      r = await fetch(`${SB_URL}/rest/v1/cf_contatos_pos_venda`, {
        method: 'POST', headers: H, body: JSON.stringify(payload)
      });
    }

    if (r.ok) {
      await this.carregarContatos();
      this.filtrar();
      this.fecharModal();
    } else {
      alert('Erro ao salvar: ' + r.status);
    }
  },

  exportar() {
    let csv = 'Data,Cliente,Telefone,Loja,Vendedor,Valor,Status,Observacoes\n';
    this.clientesFiltrados.forEach(c => {
      const ct = this.contatos[c.cpf] || {};
      csv += `"${new Date(c.ultima_compra||'').toLocaleDateString('pt-BR')}","${c.nome}","${c.telefone||''}","${c.loja||''}","${c.vendedor||''}","${c.total_compras||0}","${ct.contatado?'Contatado':'Pendente'}","${(ct.observacoes||'').replace(/"/g,'""')}"\n`;
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'contatos-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
  },

  sair() {
    localStorage.removeItem('cf_sessao_usuario');
    location.href = 'login.html';
  }
};

window.onclick = e => { if (e.target === document.getElementById('modal')) App.fecharModal(); };
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body></html>
