<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CashFlow — Sync SWN</title>
<style>
:root{--bg:#080810;--s:#10101a;--s2:#18182a;--bd:#252538;--ac:#00e5a0;--tx:#e6e6f0;--mt:#666688}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:32px;width:100%;max-width:560px}
h2{font-size:18px;font-weight:600;margin-bottom:4px}
h2 span{color:var(--ac)}
.sub{font-size:12px;color:var(--mt);margin-bottom:24px}
.cf-group{margin-bottom:12px}
.cf-group label{font-size:10px;color:var(--mt);font-family:monospace;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.cf-group input{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13px;font-family:monospace;outline:none}
.cf-group input:focus{border-color:var(--ac)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.stat{background:var(--s2);border-radius:9px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:600;color:var(--ac)}
.stat-lbl{font-size:10px;color:var(--mt);font-family:monospace;text-transform:uppercase;margin-top:2px}
.prog-wrap{height:6px;background:var(--bd);border-radius:3px;margin:12px 0;overflow:hidden}
.prog-bar{height:100%;background:var(--ac);border-radius:3px;transition:width .3s;width:0%}
.log{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:12px;max-height:160px;overflow-y:auto;margin:12px 0;font-family:monospace;font-size:11px}
.log-row{color:var(--mt);padding:2px 0;display:flex;gap:8px}
.log-t{color:var(--ac);min-width:58px}
.log-ok{color:var(--ac)}
.log-err{color:#e24b4a}
.btns{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:sans-serif;transition:all .15s}
.btn-primary{background:var(--ac);color:#080810}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.done{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);border-radius:10px;padding:16px;text-align:center;margin-top:14px;display:none}
.done h3{color:var(--ac);margin-bottom:6px}
.done p{font-size:12px;color:var(--mt);margin-bottom:12px}
.done-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.done-link{padding:8px 16px;background:var(--s2);color:var(--ac);border:1px solid rgba(0,229,160,.25);border-radius:8px;font-size:12px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h2>Cash<span>Flow</span> — Sync SWN</h2>
  <div class="sub">Sincronização com loja · portal swn.almode.store</div>

  <div class="cf-group">
    <label>Domínio</label>
    <input type="text" id="domain" value="swn.almode.store">
  </div>
  <div class="cf-group">
    <label>Token JWT</label>
    <input type="password" id="token" placeholder="Cole o token do SWN">
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="sPags">0</div><div class="stat-lbl">Páginas</div></div>
    <div class="stat"><div class="stat-val" id="sClientes">0</div><div class="stat-lbl">Clientes</div></div>
    <div class="stat"><div class="stat-val" id="sPct">0%</div><div class="stat-lbl">Progresso</div></div>
  </div>

  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>

  <div class="log" id="log"><div class="log-row"><span class="log-t">--:--:--</span><span>Aguardando...</span></div></div>

  <div class="btns">
    <button class="btn btn-primary" id="btnLote" onclick="rodarLote()">▶ Iniciar Sincronização</button>
    <button class="btn btn-ghost" id="btnSalvar" onclick="salvarFinal()" disabled>💾 Salvar Final</button>
  </div>

  <div class="done" id="done">
    <h3>✅ Sincronização concluída!</h3>
    <p id="doneMsg"></p>
    <div class="done-links">
      <a href="carregar-com-loja.html" class="done-link">📥 Importar Portal Antigo</a>
      <a href="rfm.html" class="done-link">📊 Painel RFM</a>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 50
const LOTE_SIZE = 5
const CASHBACK_PCT = 0.05

let state = {
  pagina: 0,
  totalPaginas: null,
  mapa: {},
  totalVendas: 0,
  rodando: false,
  concluido: false
}

// Carrega estado salvo se existir
try {
  const saved = localStorage.getItem('cf_sync_swn_state')
  if (saved) {
    const s = JSON.parse(saved)
    state = { ...state, ...s, rodando: false }
    atualizarUI()
    log(`Estado anterior carregado — página ${state.pagina}`, 'ok')
    document.getElementById('btnLote').textContent = state.pagina > 0 ? '▶ Continuar' : '▶ Iniciar Sincronização'
  }
} catch(e) {}

async function rodarLote() {
  if (state.rodando) return
  const domain = document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'')
  const token = document.getElementById('token').value.trim()
  if (!token) { alert('Cole o token JWT!'); return }

  state.rodando = true
  document.getElementById('btnLote').disabled = true
  document.getElementById('btnLote').textContent = 'Processando...'

  try {
    // Pega total de páginas na primeira vez
    if (state.totalPaginas === null) {
      const info = await api(domain, token, `/api/vendas?page=0&size=1`)
      state.totalPaginas = info.totalPages
      log(`Total: ${info.totalElements} vendas · ${info.totalPages} páginas`, 'ok')
    }

    // Processa LOTE_SIZE páginas
    const ate = Math.min(state.pagina + LOTE_SIZE, state.totalPaginas)
    const promises = []
    for (let i = state.pagina; i < ate; i++) {
      promises.push(api(domain, token, `/api/vendas?page=${i}&size=${PAGE_SIZE}`).catch(()=>({content:[]})))
    }

    const resultados = await Promise.all(promises)
    for (const r of resultados) processar(r.content || [])

    state.pagina = ate
    const pct = Math.round(state.pagina / state.totalPaginas * 100)

    // Salva estado
    localStorage.setItem('cf_sync_swn_state', JSON.stringify({
      pagina: state.pagina,
      totalPaginas: state.totalPaginas,
      mapa: state.mapa,
      totalVendas: state.totalVendas
    }))

    atualizarUI()
    log(`Páginas ${state.pagina}/${state.totalPaginas} — ${Object.keys(state.mapa).length} clientes`, 'ok')

    if (state.pagina >= state.totalPaginas) {
      state.concluido = true
      log('✅ Todas as páginas processadas! Clique em Salvar Final.', 'ok')
      document.getElementById('btnSalvar').disabled = false
      document.getElementById('btnLote').textContent = '✅ Concluído'
    } else {
      document.getElementById('btnLote').textContent = `▶ Próximo lote (${state.pagina}/${state.totalPaginas})`
      document.getElementById('btnLote').disabled = false
      // Auto-continua após 500ms
      setTimeout(rodarLote, 500)
    }

  } catch(e) {
    log('Erro: ' + e.message, 'err')
    document.getElementById('btnLote').disabled = false
    document.getElementById('btnLote').textContent = '▶ Tentar novamente'
  }

  state.rodando = false
}

function processar(vendas) {
  for (const v of vendas) {
    if (v.situacao !== 'Concluida') continue
    const cpf = (v.cpfDoCliente||'').replace(/\D/g,'')
    if (cpf.length < 11) continue
    const valor = (v.pagamentos||[]).reduce((s,p)=>s+(parseFloat(p.valor)||0),0)
    if (valor <= 0) continue
    const nome = v.cliente?.razaoSocialOuNome || '—'
    const loja = v.pontoDeVenda?.loja?.nomeFantasia || '—'
    const tel = (v.cliente?.telefones||[])[0]||''
    const data = v.dataHora||''
    if (!state.mapa[cpf]) state.mapa[cpf] = { cpf, nome, totalCompras:0, cashback:0, qtdVendas:0, telefone:tel, ultimaCompra:data, lojas:{} }
    const c = state.mapa[cpf]
    c.totalCompras += valor
    c.cashback += valor * CASHBACK_PCT
    c.qtdVendas++
    if (nome !== '—') c.nome = nome
    if (data > c.ultimaCompra) c.ultimaCompra = data
    if (!c.lojas[loja]) c.lojas[loja] = {total:0, qtd:0}
    c.lojas[loja].total += valor
    c.lojas[loja].qtd++
    state.totalVendas++
  }
}

function salvarFinal() {
  // Define loja principal
  const clientes = Object.values(state.mapa).map(c => ({
    ...c,
    loja: Object.entries(c.lojas).sort((a,b)=>b[1].total-a[1].total)[0]?.[0] || '—'
  })).sort((a,b)=>b.cashback-a.cashback)

  localStorage.setItem('cf_clientes_v2', JSON.stringify({
    clientes,
    syncLastAt: new Date().toISOString()
  }))
  localStorage.removeItem('cf_sync_swn_state')

  const dist = {}
  clientes.forEach(c => { dist[c.loja] = (dist[c.loja]||0)+1 })

  document.getElementById('doneMsg').textContent =
    clientes.length + ' clientes salvos · ' +
    Object.entries(dist).map(([l,n])=>l+': '+n).join(' · ')
  document.getElementById('done').style.display = 'block'
  document.getElementById('btnSalvar').disabled = true
  log('✅ Salvo! ' + clientes.length + ' clientes com loja.', 'ok')
}

async function api(domain, token, path) {
  const r = await fetch('https://'+domain+path, {
    headers: { 'Authorization': 'Bearer '+token }
  })
  if (!r.ok) throw new Error('HTTP '+r.status)
  return r.json()
}

function atualizarUI() {
  const n = Object.keys(state.mapa).length
  const pct = state.totalPaginas ? Math.round(state.pagina/state.totalPaginas*100) : 0
  document.getElementById('sPags').textContent = state.pagina + (state.totalPaginas?'/'+state.totalPaginas:'')
  document.getElementById('sClientes').textContent = n
  document.getElementById('sPct').textContent = pct+'%'
  document.getElementById('progBar').style.width = pct+'%'
}

function log(msg, type) {
  const t = new Date().toLocaleTimeString('pt-BR')
  const cls = type==='ok'?'log-ok':type==='err'?'log-err':''
  const row = document.createElement('div')
  row.className = 'log-row'
  row.innerHTML = `<span class="log-t">${t}</span><span class="${cls}">${msg}</span>`
  const box = document.getElementById('log')
  box.appendChild(row)
  box.scrollTop = box.scrollHeight
}
</script>
</body>
</html>
