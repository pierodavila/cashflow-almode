<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Login - CashFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 36px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .login-form {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-message {
      display: none;
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #c62828;
      font-size: 14px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .login-footer {
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
      font-size: 13px;
      color: #666;
      border-top: 1px solid #e0e0e0;
    }

    .info-box {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #1565c0;
      border-left: 4px solid #1976d2;
    }

    .info-box strong {
      display: block;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      .login-container {
        border-radius: 10px;
      }

      .login-header h1 {
        font-size: 28px;
      }

      .login-form {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- HEADER -->
  <div class="login-header">
    <h1>💰 CashFlow</h1>
    <p>Gestão de Cashback - Login Seguro</p>
  </div>

  <!-- FORM -->
  <div class="login-form">
    <!-- INFO BOX -->
    <div class="info-box">
      <strong>ℹ️ Instruções:</strong>
      Digite seu login. A senha será verificada automaticamente.
    </div>

    <!-- ERROR MESSAGE -->
    <div id="errorMessage" class="error-message">
      ❌ Login não encontrado!
    </div>

    <!-- LOADING -->
    <div id="loadingMessage" class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 15px; color: #667eea; font-weight: bold;">Autenticando...</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">👤 Login</label>
        <input 
          type="text" 
          id="username" 
          placeholder="Digite seu login (ex: piero)" 
          required 
          autofocus
          autocomplete="username"
        >
      </div>

      <button type="submit" class="btn-login">🔓 Entrar</button>
    </form>
  </div>

  <!-- FOOTER -->
  <div class="login-footer">
    <p>🔒 Sistema seguro com controle de acesso por papel</p>
    <p style="margin-top: 10px; font-size: 12px;">💡 Logins disponíveis: piero, forum, colcci, triton, carlos, ana, joao</p>
  </div>
</div>

<!-- SCRIPT -->
<script>
// ============================================================
// SISTEMA DE AUTENTICAÇÃO COM REDIRECIONAMENTO
// ============================================================

const usuarios = {
  // Admins
  'piero': {
    tipo: 'admin',
    nome: 'Piero Davila',
    loja: null,
    redireciona: 'index.html'
  },

  // Gerentes das Lojas
  'forum': {
    tipo: 'gerente',
    nome: 'Gerente Forum',
    loja: 'FORUM OUTLET',
    redireciona: 'rfm.html'
  },
  'colcci': {
    tipo: 'gerente',
    nome: 'Gerente Colcci',
    loja: 'COLCCI OUTLET OPRJ',
    redireciona: 'rfm.html'
  },
  'triton': {
    tipo: 'gerente',
    nome: 'Gerente Triton',
    loja: 'TRITON OUTLET',
    redireciona: 'rfm.html'
  },

  // Vendedores
  'carlos': {
    tipo: 'vendedor',
    nome: 'Carlos Silva',
    loja: 'FORUM OUTLET',
    redireciona: 'contatos-pos-venda.html'
  },
  'ana': {
    tipo: 'vendedor',
    nome: 'Ana Santos',
    loja: 'COLCCI OUTLET OPRJ',
    redireciona: 'contatos-pos-venda.html'
  },
  'joao': {
    tipo: 'vendedor',
    nome: 'João Oliveira',
    loja: 'TRITON OUTLET',
    redireciona: 'contatos-pos-venda.html'
  }
};

async function handleLogin(event) {
  event.preventDefault();

  const username = document.getElementById('username').value.toLowerCase().trim();
  const errorMsg = document.getElementById('errorMessage');
  const loadingMsg = document.getElementById('loadingMessage');
  const loginForm = document.getElementById('loginForm');

  // Limpar mensagem de erro
  errorMsg.style.display = 'none';

  // Validar usuário
  const usuario = usuarios[username];
  
  if (!usuario) {
    errorMsg.textContent = '❌ Login não encontrado! Verifique se digitou corretamente.';
    errorMsg.style.display = 'block';
    document.getElementById('username').focus();
    return;
  }

  // Mostrar loading
  loginForm.style.display = 'none';
  loadingMsg.style.display = 'block';

  // Simular delay de autenticação
  await new Promise(r => setTimeout(r, 1500));

  // Salvar dados de sessão
  const sessao = {
    username: username,
    nome: usuario.nome,
    tipo: usuario.tipo,
    loja: usuario.loja,
    datalogin: new Date().toISOString(),
    logado: true
  };

  localStorage.setItem('cf_sessao_usuario', JSON.stringify(sessao));

  // Log de auditoria
  console.log(`✅ ${usuario.tipo.toUpperCase()} ${usuario.nome} fez login em ${new Date().toLocaleString('pt-BR')}`);

  // Redirecionar
  console.log(`🔄 Redirecionando para: ${usuario.redireciona}`);
  
  setTimeout(() => {
    window.location.href = usuario.redireciona;
  }, 500);
}

// Verificar se já está logado
window.addEventListener('DOMContentLoaded', () => {
  const sessao = JSON.parse(localStorage.getItem('cf_sessao_usuario') || 'null');
  
  if (sessao && sessao.logado) {
    // Se já está logado, redireciona automaticamente
    const tipoUsuario = sessao.tipo;
    let pagina = 'index.html';
    
    if (tipoUsuario === 'admin') {
      pagina = 'index.html';
    } else if (tipoUsuario === 'gerente') {
      pagina = 'rfm.html';
    } else if (tipoUsuario === 'vendedor') {
      pagina = 'contatos-pos-venda.html';
    }
    
    window.location.href = pagina;
  }
});

// Tecla ENTER para submit
document.getElementById('loginForm').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
});
</script>

</body>
</html>
